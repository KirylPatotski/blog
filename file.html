<!DOCTYPE html>
<html>
<head>
  <title>Birthday Calculator</title>
  <style>
    .container {
      margin: 0 auto;
      width: 100%;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .input-group {
      margin-bottom: 10px;
      width: 100%;
    }
    .input-group label {
      display: block;
      width: 100%;
      margin-bottom: 5px;
      font-weight: bold;
    }
    .input-group input {
      width: 100%;
      padding: 5px;
      font-size: 16px;
      border-radius: 3px;
      border: 1px solid #ccc;
    }
    .result {
      font-size: 18px;
      font-weight: bold;
      width: 100%;
    }
    button{
        width: 100%;
      padding: 5px;
      font-size: 16px;
      border-radius: 3px;
      border: 1px solid #ccc;
    }
    .result span {
      color: blue;
    }
    
  </style>

<title>Life is finite</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="icon.png" type="image/x-icon">
<link rel="shortcut icon" href="icon.png" type="image/x-icon">
</head>
<body>
  <div class="container">
    <div class="input-group">
      <label for="birthday">Enter your birthday:</label>
      <input type="date" id="birthday" required>
    </div>
    <button onclick="calculate()">Calculate</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    function calculate() {
      var birthday = document.getElementById('birthday').value;
      var birthDate = new Date(birthday);
      var currentDate = new Date();
      var totalLifeMilliseconds = currentDate - birthDate;
      var totalLifeYears = totalLifeMilliseconds / (1000 * 60 * 60 * 24 * 365.25);
      var percentageLived = ((totalLifeYears/80)*100).toFixed(3) + '%';
  
      var resultElement = document.getElementById('result');
      resultElement.innerHTML = 'You have lived <span>' + percentageLived + '</span> of your life.';
    }
  </script>
  
</body>
</html>
